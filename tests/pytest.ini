[pytest]
addopts =
    --html=reports/report.html
    --self-contained-html
    -v

markers =
    upload: File upload happy path
    validation: Client-side validation (format and size)
    management: Document table and deletion flows
    drag_drop: Drag and drop upload
    smoke: Core happy-path scenarios

filterwarnings =
    ignore::DeprecationWarning
