[pytest]
addopts =
    --html=reports/report.html
    --self-contained-html
    -v

markers =
    upload: File upload happy path
    validation: Client-side validation (format and size)
    management: Document table and deletion flows
    drag_drop: Drag and drop upload
    smoke: Core happy-path scenarios
    registration: Registration-specific functionality

filterwarnings =
    ignore::DeprecationWarning

@pytest.mark.validation: Field validation and error handling
@pytest.mark.smoke: Critical happy-path and error scenarios
@pytest.mark.registration: Registration-specific functionality
