name: Test Automation

on:
  pull_request:
    branches:
      - development
      - main

jobs:
  e2e-tests:
    name: Run Playwright BDD Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p tests/reports/screenshots

      - name: Create backend .env
        run: |
          printf 'PORT=5001\nMONGODB_URI=%s\nOPENAI_API_KEY=%s\nJWT_SECRET=%s\n' \
            "${{ secrets.MONGODB_URI }}" \
            "${{ secrets.OPENAI_API_KEY }}" \
            "${{ secrets.JWT_SECRET }}" \
            > test-case-generator/backend/.env

      - name: Create tests .env
        run: |
          printf 'TEST_USERNAME=%s\nTEST_PASSWORD=%s\n' \
            "${{ secrets.TEST_USERNAME }}" \
            "${{ secrets.TEST_PASSWORD }}" \
            > tests/.env

      - name: Build and run tests
        working-directory: test-case-generator
        run: docker compose --profile test run --rm test-runner

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/reports/
          retention-days: 14
