name: Test Automation

on:
  pull_request:
    branches:
      - development
      - main

jobs:
  e2e-tests:
    name: Run Playwright BDD Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p tests/reports/screenshots

      - name: Build and run tests
        working-directory: test-case-generator
        run: docker compose --profile test run --rm test-runner

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/reports/
          retention-days: 14
