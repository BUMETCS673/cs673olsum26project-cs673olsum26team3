services:
  backend-service:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env

  frontend-service:
    build: ./frontend
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    environment:
      - VITE_PROXY_TARGET=http://backend-service:5001
  
  test-runner:
    build:
      context: ../tests
      dockerfile: Dockerfile
    env_file:
      - ../tests/.env
    environment:
      - BASE_URL=http://frontend-service:5173
      - BACKEND_URL=http://backend-service:5001
    volumes:
      - ../tests:/tests
      - ../tests/reports:/tests/reports
    depends_on:
      - backend-service
      - frontend-service
    profiles:
      - test